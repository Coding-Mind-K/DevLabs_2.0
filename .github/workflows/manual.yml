name: Auto Merge PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto merge
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
